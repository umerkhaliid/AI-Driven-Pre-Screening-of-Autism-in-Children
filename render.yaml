services:
  - type: web
    name: ai-driven-pre-screening-of-autism-in
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm
    startCommand: uvicorn server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health
    autoDeploy: true
